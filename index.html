const {useState,useEffect,useCallback,useMemo,useRef}=React;

/* Colors: light theme */
const C={green:"#16a34a",red:"#dc2626",purple:"#7c3aed",blue:"#2563eb",amber:"#d97706",
  bg:"#f8fafc",card:"#ffffff",cardBorder:"#e2e8f0",text:"#1e293b",textSec:"#64748b",textTer:"#94a3b8",

const CAT_TREE={"Alimentação":["Supermercado","Restaurante","Delivery","Padaria","Feira","Outros"],"Moradia":["Aluguel","Condomínio","Energia","Água","Gás","Internet","IPTU","Manutenção","Outros"],"Transporte":["Combustível","Estacionamento","Transporte público","Uber/99","Manutenção veículo","Seguro veículo","IPVA","Pedágio","Outros"],"Saúde":["Plano de saúde","Consulta médica","Farmácia","Dentista","Exames","Academia","Outros"],"Educação":["Escola/Faculdade","Curso online","Livros","Material escolar","Outros"],"Lazer":["Cinema/Teatro","Viagem","Streaming","Jogos","Hobby","Bares","Outros"],"Vestuário":["Roupas","Calçados","Acessórios","Outros"],"Renda":["Salário","Comissão","Freelance","Investimentos","Aluguel recebido","Vendas","Bônus","Estorno","Reembolso","13º Salário","Férias","Dividendos","Publi/Parceria","Plataformas digitais","Outros"],"Finanças":["Transferência","Empréstimo","Juros","Tarifas bancárias","Outros"],"Compras":["Eletrônicos","Móveis","Eletrodomésticos","Presentes","Outros"],"Serviços":["Assinaturas","Celular","Seguros","Contabilidade","Outros"],"Pets":["Ração","Veterinário","Acessórios","Outros"],"Pessoal":["Beleza","Cuidados pessoais","Outros"],"Marketing Digital":["Tráfego pago","Ferramentas","Plataformas","Produção de conteúdo","Equipamentos","Assessoria","Cursos","Comissão plataforma","Outros"],"Outros":["Outros"]};
const CAT_KEYS=Object.keys(CAT_TREE);
const MONTHS=["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
const ACCT_COLORS=["#6366f1","#2563eb","#0891b2","#16a34a","#d97706","#dc2626","#db2777","#7c3aed","#059669","#ea580c"];
const PROF_COLORS=["#6366f1","#2563eb","#16a34a","#dc2626"];

const fmt=(v)=>{try{return v.toLocaleString("pt-BR",{style:"currency",currency:"BRL"})}catch{return"R$ 0,00"}};
const td=()=>new Date().toISOString().split("T")[0];
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const STORE_KEY="financas_app_data";
const DD={profiles:[],accounts:[],txs:[],curProfileId:null};
function loadAll(){try{const r=localStorage.getItem(STORE_KEY);if(r)return JSON.parse(r)}catch(e){}return DD}
function saveAll(d){try{localStorage.setItem(STORE_KEY,JSON.stringify(d))}catch(e){}}

/* Icons */
function IcoBank(){return <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 21h18"/><path d="M3 10h18"/><path d="M12 3l9 7H3z"/><path d="M5 10v11"/><path d="M19 10v11"/><path d="M9 10v11"/><path d="M15 10v11"/></svg>}
function IcoCard(){return <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>}
function IcoPlus(){return <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>}
function IcoTrash(){return <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>}
function IcoEdit(){return <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>}
function IcoChevL(){return <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"/></svg>}
function IcoChevR(){return <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"/></svg>}
function IcoClose(){return <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>}
function IcoUp(){return <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><path d="M12 19V5"/><path d="M5 12l7-7 7 7"/></svg>}
function IcoDown(){return <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><path d="M12 5v14"/><path d="M19 12l-7 7-7-7"/></svg>}
function IcoTransfer(){return <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><path d="M17 1l4 4-4 4"/><path d="M3 11V9a4 4 0 014-4h14"/><path d="M7 23l-4-4 4-4"/><path d="M21 13v2a4 4 0 01-4 4H3"/></svg>}
function IcoBack(){return <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"/></svg>}
function IcoUser(){return <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>}
function IcoCheck(){return <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>}
function IcoMove(){return <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="5 9 2 12 5 15"/><polyline points="19 9 22 12 19 15"/><line x1="2" y1="12" x2="22" y2="12"/></svg>}
function IcoSearch(){return <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>}
function IcoMinus(){return <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round"><line x1="5" y1="12" x2="19" y2="12"/></svg>}
function IcoPlusSmall(){return <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>}

/* UI */
function Modal({open,onClose,title,children}){if(!open)return null;return <div style={ST.overlay} onClick={onClose}><div style={ST.modal} onClick={e=>e.stopPropagation()}><div style={ST.modalH}><h3 style={{fontSize:17,fontWeight:700,color:C.text}}>{title}</h3><button style={ST.iBtn} onClick={onClose}><IcoClose/></button></div>{children}</div></div>}
function Field({label,children,error}){return <div style={{display:"flex",flexDirection:"column",gap:5}}><label style={ST.lbl}>{label}</label>{children}{error&&<span style={{fontSize:11,color:C.red}}>{error}</span>}</div>}
function SumCard({label,value,color}){return <div style={{flex:"1 1 130px",background:C.card,borderRadius:10,padding:"10px 12px",display:"flex",flexDirection:"column",gap:3,borderLeft:"3px solid "+color,boxShadow:"0 1px 3px rgba(0,0,0,0.06)"}}><span style={{fontSize:10,fontWeight:600,color:C.textSec,textTransform:"uppercase",letterSpacing:"0.5px"}}>{label}</span><span style={{fontSize:15,fontWeight:700,fontFamily:"'JetBrains Mono',monospace",color}}>{value}</span></div>}
function CatSelect({value,onChange,style}){const parts=value?value.split(" > "):["Outros","Outros"];const cat=parts[0]||"Outros";const sub=parts[1]||"Outros";const subs=CAT_TREE[cat]||["Outros"];return <div style={{display:"flex",gap:6}}><select style={{...style,flex:1}} value={cat} onChange={e=>{const c=e.target.value;onChange(c+" > "+(CAT_TREE[c]||["Outros"])[0])}}>{CAT_KEYS.map(c=><option key={c} value={c}>{c}</option>)}</select><select style={{...style,flex:1}} value={sub} onChange={e=>onChange(cat+" > "+e.target.value)}>{subs.map(s=><option key={s} value={s}>{s}</option>)}</select></div>}
function DescInput({value,onChange,onSelect,suggestions,style,className}){const[show,setShow]=useState(false);const[filtered,setFiltered]=useState([]);const handleChange=v=>{onChange(v);if(v.length>=2){const f=[...new Set(suggestions)].filter(s=>s.toLowerCase().includes(v.toLowerCase())).slice(0,6);setFiltered(f);setShow(f.length>0)}else setShow(false)};return <div style={{position:"relative"}}><input style={style} className={className} placeholder="Ex: Supermercado" value={value} onChange={e=>handleChange(e.target.value)} onFocus={()=>{if(filtered.length>0)setShow(true)}} onBlur={()=>setTimeout(()=>setShow(false),200)}/>{show&&<div className="suggestions-list">{filtered.map((s,i)=><button key={i} onMouseDown={e=>{e.preventDefault();if(onSelect)onSelect(s);else onChange(s);setShow(false)}}>{s}</button>)}</div>}</div>}
/* Money input: types digits, formats as currency with comma. Internal value is string number like "10.00" */
function MoneyInput({value,onChange,style,className}){
  // value is the form's amount string like "10.5". Display as "10,50" formatted.
  const cents=Math.round((parseFloat(value)||0)*100);
  const display=cents===0?"":(cents/100).toLocaleString("pt-BR",{minimumFractionDigits:2,maximumFractionDigits:2});
  const handleChange=e=>{
    // Strip everything except digits
    const digits=e.target.value.replace(/\D/g,"");
    if(!digits){onChange("");return}
    const newCents=parseInt(digits,10);
    onChange((newCents/100).toString());
  };
  return <input type="text" inputMode="numeric" style={style} className={className} placeholder="0,00" value={display} onChange={handleChange}/>
}
function InstStepper({value,onChange,disabled}){return <div style={{display:"flex",alignItems:"center",gap:0,background:C.inputBg,border:"1px solid "+C.inputBorder,borderRadius:10,overflow:"hidden"}}><button style={{...ST.stepBtn,opacity:disabled?0.3:1}} disabled={disabled||value<=1} onClick={()=>onChange(Math.max(1,value-1))}><IcoMinus/></button><input type="number" min="1" max="48" style={{...ST.input,width:50,textAlign:"center",border:"none",borderRadius:0,padding:"11px 4px"}} value={value} onChange={e=>onChange(parseInt(e.target.value)||1)} disabled={disabled}/><button style={{...ST.stepBtn,opacity:disabled?0.3:1}} disabled={disabled} onClick={()=>onChange(Math.min(48,value+1))}><IcoPlusSmall/></button></div>}

/* ═══ APP ═══ */
function App(){
  const init=useRef(loadAll());
  const[profiles,setProfiles]=useState(init.current.profiles||[]);
  const[curProfileId,setCurProfileId]=useState(init.current.curProfileId||null);
  const[accounts,setAccounts]=useState(init.current.accounts||[]);
  const[txs,setTxs]=useState(init.current.txs||[]);
  const[viewStack,setViewStack]=useState(["home"]);
  const[selAcctId,setSelAcctId]=useState(null);
  const[modal,setModal]=useState(null);
  const[editItem,setEditItem]=useState(null);
  const[profMenuOpen,setProfMenuOpen]=useState(false);
  const[searchOpen,setSearchOpen]=useState(false);
  const[searchQ,setSearchQ]=useState("");
  const[month,setMonth]=useState(()=>{const d=new Date();return{m:d.getMonth(),y:d.getFullYear()}});

  const view=viewStack[viewStack.length-1];
  const pushView=v=>setViewStack(p=>[...p,v]);
  const popView=()=>setViewStack(p=>p.length>1?p.slice(0,-1):p);

  useEffect(()=>{const h=e=>{if(viewStack.length>1){e.preventDefault();popView()}};window.addEventListener('popstate',h);return()=>window.removeEventListener('popstate',h)},[viewStack]);
  useEffect(()=>{if(viewStack.length>1)window.history.pushState(null,"")},[viewStack]);

  // Swipe to change month
  const touchStart=useRef(null);
  const handleTouchStart=e=>{touchStart.current=e.touches[0].clientX};
  const handleTouchEnd=e=>{
    if(touchStart.current===null)return;
    const diff=touchStart.current-e.changedTouches[0].clientX;
    touchStart.current=null;
    if(diff>80){navMonth(1)}else if(diff<-140){navMonth(-1)}
  };

  // Balance mode: "full" = end of month, "today" = up to today
  const[balMode,setBalMode]=useState("full");
  const now=new Date();const isCurrentMonth=month.m===now.getMonth()&&month.y===now.getFullYear();
  const todayKey=td();

  // Go to current month
  const goToday=()=>{const d=new Date();setMonth({m:d.getMonth(),y:d.getFullYear()})};

  const st=useRef(null);const fr=useRef(true);
  useEffect(()=>{if(fr.current){fr.current=false;return}if(st.current)clearTimeout(st.current);st.current=setTimeout(()=>saveAll({profiles,accounts,txs,curProfileId}),400);return()=>{if(st.current)clearTimeout(st.current)}},[profiles,accounts,txs,curProfileId]);

  const mKey=`${month.y}-${String(month.m+1).padStart(2,"0")}`;
  const activeProfile=profiles.find(p=>p.id===curProfileId)||null;
  const myAccounts=useMemo(()=>accounts.filter(a=>a.profileId===curProfileId),[accounts,curProfileId]);
  const bankAccts=useMemo(()=>myAccounts.filter(a=>a.type==="bank"),[myAccounts]);
  const cardAccts=useMemo(()=>myAccounts.filter(a=>a.type==="card"),[myAccounts]);
  const curAcct=accounts.find(a=>a.id===selAcctId)||null;
  const allDescriptions=useMemo(()=>[...new Set(txs.map(t=>t.description).filter(Boolean))],[txs]);
  const descCatMap=useMemo(()=>{const m={};txs.forEach(t=>{if(t.description&&t.category)m[t.description]=t.category});return m},[txs]);
  const getProfName=acct=>{const pr=(profiles||[]).find(p=>p.id===acct.profileId);return pr?pr.name:""};
  const navMonth=d=>setMonth(p=>{let m=p.m+d,y=p.y;if(m<0){m=11;y--}else if(m>11){m=0;y++}return{m,y}});

  /* Profile */
  const addProfile=d=>{const np={id:uid(),...d};setProfiles(p=>[...p,np]);setCurProfileId(np.id);setModal(null)};
  const deleteProfile=id=>{const aIds=accounts.filter(a=>a.profileId===id).map(a=>a.id);setAccounts(p=>p.filter(a=>a.profileId!==id));setTxs(p=>p.filter(t=>!aIds.includes(t.accountId)));setProfiles(p=>p.filter(x=>x.id!==id));if(curProfileId===id){const rem=profiles.filter(x=>x.id!==id);setCurProfileId(rem.length>0?rem[0].id:null)}setViewStack(["home"]);setProfMenuOpen(false)};

  /* Account */
  const addAccount=d=>{setAccounts(p=>[...p,{id:uid(),profileId:curProfileId,...d}]);setModal(null)};
  const updateAccount=(id,d)=>{setAccounts(p=>p.map(a=>a.id===id?{...a,...d}:a));setModal(null)};
  const deleteAccount=id=>{if(!confirm("Excluir conta e todas transações?"))return;setAccounts(p=>p.filter(a=>a.id!==id));setTxs(p=>p.filter(t=>t.accountId!==id&&t.toAccountId!==id));if(selAcctId===id)setViewStack(["home"])};

  /* ─── Transaction CRUD ─── */
  const addTx=useCallback(tx=>{
    const batch=[];
    if(tx.installments>1){
      const gid=uid();
      for(let i=0;i<tx.installments;i++){
        const d=new Date(tx.date+"T12:00:00");d.setMonth(d.getMonth()+i);
        const ds=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
        let instDD="";if(tx.dueDate){const dd=new Date(tx.dueDate+"T12:00:00");dd.setMonth(dd.getMonth()+i);instDD=dd.getFullYear()+"-"+String(dd.getMonth()+1).padStart(2,"0")+"-"+String(dd.getDate()).padStart(2,"0")}
        const mainId=uid();
        batch.push({id:mainId,accountId:tx.accountId,date:ds,description:tx.description,category:tx.category,amount:tx.amount,type:tx.type,dueDate:instDD,installments:1,isRecurring:false,paid:false,groupId:gid,instNum:i+1,instTotal:tx.installments,instUnitAmount:tx.amount,toAccountId:tx.toAccountId||""});
        if(tx.type==="transfer"&&tx.toAccountId){batch.push({id:uid(),accountId:tx.toAccountId,date:ds,description:tx.description,category:"Finanças > Transferência",amount:tx.amount,type:"transfer_in",fromAccountId:tx.accountId,installments:1,isRecurring:false,dueDate:instDD,paid:false,_mirrorOf:mainId,groupId:gid,instNum:i+1,instTotal:tx.installments,instUnitAmount:tx.amount})}
      }
    } else {
      const mainId=uid();
      batch.push({id:mainId,...tx,paid:tx.paid||false,groupId:null,instNum:null,instTotal:null});
      if(tx.type==="transfer"&&tx.toAccountId){batch.push({id:uid(),accountId:tx.toAccountId,date:tx.date,description:tx.description,category:"Finanças > Transferência",amount:tx.amount,type:"transfer_in",fromAccountId:tx.accountId,installments:1,isRecurring:tx.isRecurring||false,dueDate:tx.dueDate||"",paid:tx.paid||false,_mirrorOf:mainId})}
    }
    setTxs(p=>[...p,...batch].sort((a,b)=>a.date.localeCompare(b.date)));setModal(null);
  },[]);

  const updateTx=useCallback((id,data,recurScope)=>{
    setTxs(p=>{
      const orig=p.find(t=>t.id===id);if(!orig)return p;
      // Sanitize: only keep editable fields, strip virtual/internal flags
      const clean={};
      ["description","amount","date","category","dueDate","type","toAccountId","installments","isRecurring","paid","accountId"].forEach(k=>{if(data[k]!==undefined)clean[k]=data[k]});
      let patchData={...clean};
      // Recurring: scope handling
      if(orig.isRecurring&&recurScope){
        if(recurScope==="this"){
          // Save only changed editable fields as override (no paid - that's separate)
          const overrideFields={};
          ["description","amount","date","category","dueDate"].forEach(k=>{if(clean[k]!==undefined)overrideFields[k]=clean[k]});
          const mo=orig.monthOverrides?{...orig.monthOverrides}:{};
          mo[mKey]={...mo[mKey],...overrideFields};
          // Handle paid separately via paidMonths
          let updated=p.map(t=>t.id===id?{...t,monthOverrides:mo}:t);
          if(clean.paid!==undefined){
            const pm=orig.paidMonths?[...orig.paidMonths]:[];
            if(clean.paid&&!pm.includes(mKey))pm.push(mKey);
            else if(!clean.paid){const idx=pm.indexOf(mKey);if(idx>=0)pm.splice(idx,1)}
            updated=updated.map(t=>t.id===id?{...t,paidMonths:pm}:t);
          }
          return updated.sort((a,b)=>a.date.localeCompare(b.date));
        }
        if(recurScope==="forward"){
          const prevM=new Date(month.y,month.m,0);
          const endStr=prevM.getFullYear()+"-"+String(prevM.getMonth()+1).padStart(2,"0")+"-"+String(prevM.getDate()).padStart(2,"0");
          const newTx={...orig,...clean,id:uid(),date:mKey+"-"+orig.date.split("-")[2],endDate:undefined,excludedMonths:undefined,paidMonths:undefined,monthOverrides:undefined};
          return [...p.map(t=>t.id===id?{...t,endDate:endStr}:t),newTx].sort((a,b)=>a.date.localeCompare(b.date));
        }
        // "all" falls through to normal edit
      }
      // Installment scope handling
      if(orig.groupId&&recurScope){
        const editFields={};
        ["description","amount","category","dueDate"].forEach(k=>{if(clean[k]!==undefined)editFields[k]=clean[k]});
        if(clean.amount!==undefined)editFields.instUnitAmount=clean.amount;
        if(recurScope==="instThis"){
          // Edit only this installment
          let updated=p.map(t=>t.id===id?{...t,...editFields}:t);
          return updated.sort((a,b)=>a.date.localeCompare(b.date));
        }
        if(recurScope==="instForward"){
          // Edit this and all future installments in the group
          let updated=p.map(t=>{
            if(t.groupId===orig.groupId&&t.instNum>=orig.instNum)return{...t,...editFields};
            return t;
          });
          return updated.sort((a,b)=>a.date.localeCompare(b.date));
        }
        if(recurScope==="instAll"){
          // Edit all installments in the group
          let updated=p.map(t=>{
            if(t.groupId===orig.groupId)return{...t,...editFields};
            return t;
          });
          return updated.sort((a,b)=>a.date.localeCompare(b.date));
        }
      }
      if(orig.isRecurring&&clean.paid!==undefined){
        const pm=orig.paidMonths?[...orig.paidMonths]:[];
        if(clean.paid&&!pm.includes(mKey))pm.push(mKey);
        else if(!clean.paid){const idx=pm.indexOf(mKey);if(idx>=0)pm.splice(idx,1)}
        patchData.paidMonths=pm;delete patchData.paid;
      }
      let updated=p.map(t=>t.id===id?{...t,...patchData}:t);
      if(orig.type==="transfer"||orig.type==="transfer_in"){
        const mirrorId=orig.type==="transfer"?p.find(t=>t._mirrorOf===id)?.id:orig._mirrorOf;
        if(mirrorId){
          const mp={};if(clean.description)mp.description=clean.description;if(clean.amount!==undefined)mp.amount=clean.amount;if(clean.date)mp.date=clean.date;if(clean.dueDate!==undefined)mp.dueDate=clean.dueDate;
          if(clean.paid!==undefined){const mo=p.find(t=>t.id===mirrorId);if(mo&&mo.isRecurring){const mpm=mo.paidMonths?[...mo.paidMonths]:[];if(clean.paid&&!mpm.includes(mKey))mpm.push(mKey);else if(!clean.paid){const idx=mpm.indexOf(mKey);if(idx>=0)mpm.splice(idx,1)}mp.paidMonths=mpm}else{mp.paid=clean.paid}}
          updated=updated.map(t=>t.id===mirrorId?{...t,...mp}:t);
        }
      }
      return updated.sort((a,b)=>a.date.localeCompare(b.date));
    });setModal(null);setEditItem(null);
  },[mKey,month]);

  const moveTxToAccount=useCallback((id,nid,recurScope)=>{setTxs(p=>{
    const t=p.find(x=>x.id===id);if(!t)return p;
    if(t.isRecurring&&recurScope){
      if(recurScope==="this"){
        // Store monthly override for accountId
        const mo=t.monthOverrides?{...t.monthOverrides}:{};
        mo[mKey]={...mo[mKey],_movedTo:nid};
        return p.map(x=>x.id===id?{...x,monthOverrides:mo}:x);
      }
      if(recurScope==="forward"){
        // End original at previous month and create new recurring in new account
        const prevM=new Date(month.y,month.m,0);
        const endStr=prevM.getFullYear()+"-"+String(prevM.getMonth()+1).padStart(2,"0")+"-"+String(prevM.getDate()).padStart(2,"0");
        const newTx={...t,id:uid(),accountId:nid,date:mKey+"-"+t.date.split("-")[2],endDate:undefined,excludedMonths:undefined,paidMonths:undefined,monthOverrides:undefined};
        let u=p.map(x=>x.id===id?{...x,endDate:endStr}:x);
        u.push(newTx);
        // Handle transfer mirror
        if(t.type==="transfer"){const mid=p.find(x=>x._mirrorOf===id);if(mid){const newMirror={...mid,id:uid(),_mirrorOf:newTx.id,fromAccountId:nid,date:newTx.date};u.push(newMirror)}}
        return u.sort((a,b)=>a.date.localeCompare(b.date));
      }
      // "all" falls through to normal move
    }
    // Move all installments in group
    if(t.groupId){
      let u=p.map(x=>x.groupId===t.groupId?{...x,accountId:nid}:x);
      // Update mirrors
      const groupIds=p.filter(x=>x.groupId===t.groupId).map(x=>x.id);
      u=u.map(x=>{if(x._mirrorOf&&groupIds.includes(x._mirrorOf))return{...x,fromAccountId:nid};return x});
      return u;
    }
    let u=p.map(x=>x.id===id?{...x,accountId:nid}:x);
    if(t.type==="transfer")u=u.map(x=>x._mirrorOf===id?{...x,fromAccountId:nid}:x);
    if(t.type==="transfer_in"&&t._mirrorOf)u=u.map(x=>x.id===t._mirrorOf?{...x,toAccountId:nid}:x);
    return u;
  });setModal(null);setEditItem(null)},[mKey,month]);
  const togglePaid=useCallback(id=>{setTxs(p=>{const t=p.find(x=>x.id===id);if(!t)return p;let u=p.map(x=>x.id===id?{...x,paid:!x.paid}:x);if(t.type==="transfer"){const mid=p.find(x=>x._mirrorOf===id);if(mid)u=u.map(x=>x.id===mid.id?{...x,paid:!t.paid}:x)}if(t.type==="transfer_in"&&t._mirrorOf)u=u.map(x=>x.id===t._mirrorOf?{...x,paid:!t.paid}:x);return u})},[]);
  const toggleRecurPaid=useCallback((id,mk)=>{setTxs(p=>{const t=p.find(x=>x.id===id);if(!t)return p;const pm=t.paidMonths?[...t.paidMonths]:[];const np=pm.includes(mk);const nPm=np?pm.filter(x=>x!==mk):[...pm,mk];let u=p.map(x=>x.id===id?{...x,paidMonths:nPm}:x);if(t.type==="transfer"){const mid=p.find(x=>x._mirrorOf===id);if(mid){const mpm=mid.paidMonths?[...mid.paidMonths]:[];const mn=np?mpm.filter(x=>x!==mk):(mpm.includes(mk)?mpm:[...mpm,mk]);u=u.map(x=>x.id===mid.id?{...x,paidMonths:mn}:x)}}if(t.type==="transfer_in"&&t._mirrorOf){const o=p.find(x=>x.id===t._mirrorOf);if(o){const op=o.paidMonths?[...o.paidMonths]:[];const on=np?op.filter(x=>x!==mk):(op.includes(mk)?op:[...op,mk]);u=u.map(x=>x.id===t._mirrorOf?{...x,paidMonths:on}:x)}}return u})},[]);
  const deleteTx=useCallback((id,opts)=>{const dg=opts?.group;const rm=opts?.recurMode;setTxs(prev=>{const t=prev.find(x=>x.id===id);if(!t)return prev;if(rm&&t.isRecurring){if(rm==="all")return prev.filter(x=>x.id!==id&&x._mirrorOf!==id);if(rm==="this"){const excl=t.excludedMonths?[...t.excludedMonths]:[];if(!excl.includes(mKey))excl.push(mKey);return prev.map(x=>x.id===id?{...x,excludedMonths:excl}:x)}if(rm==="forward"){const pM=new Date(month.y,month.m,0);const es=pM.getFullYear()+"-"+String(pM.getMonth()+1).padStart(2,"0")+"-"+String(pM.getDate()).padStart(2,"0");return prev.map(x=>x.id===id?{...x,endDate:es}:x)}}if(dg&&t.groupId)return prev.filter(x=>x.groupId!==t.groupId);if(t.type==="transfer")return prev.filter(x=>x.id!==id&&x._mirrorOf!==id);if(t.type==="transfer_in"&&t._mirrorOf)return prev.filter(x=>x.id!==id&&x.id!==t._mirrorOf);return prev.filter(x=>x.id!==id)})},[mKey,month]);

  /* Per-account */
  const getMonthTxs=useCallback(acctId=>{
    const acct=accounts.find(a=>a.id===acctId);const isCard=acct&&acct.type==="card";const items=[];
    // Process own transactions
    txs.filter(t=>t.accountId===acctId).forEach(t=>{
      if(t.isRecurring){
        const txD=new Date((isCard?(t.dueDate||t.date):t.date)+"T12:00:00");const eom=new Date(month.y,month.m+1,0);
        if(t.endDate){const ed=new Date(t.endDate+"T12:00:00");if(eom>ed)return}
        if(t.excludedMonths&&t.excludedMonths.includes(mKey))return;
        // Check if moved away this month
        if(t.monthOverrides&&t.monthOverrides[mKey]&&t.monthOverrides[mKey]._movedTo)return;
        if(txD<=eom){
          const isPd=(t.paidMonths||[]).includes(mKey);
          const overrides=t.monthOverrides&&t.monthOverrides[mKey]?t.monthOverrides[mKey]:{};
          const defaultDate=mKey+"-"+String(txD.getDate()).padStart(2,"0");
          items.push({...t,...overrides,date:overrides.date||defaultDate,_virtual:true,_recurPaid:isPd});
        }return;
      }
      if(isCard){const ref=t.dueDate||t.date;if(ref.startsWith(mKey))items.push(t)}else{if(t.date.startsWith(mKey))items.push(t)}
    });
    // Include recurring txs moved TO this account for this month
    txs.filter(t=>t.accountId!==acctId&&t.isRecurring&&t.monthOverrides&&t.monthOverrides[mKey]&&t.monthOverrides[mKey]._movedTo===acctId).forEach(t=>{
      const txD=new Date((isCard?(t.dueDate||t.date):t.date)+"T12:00:00");const eom=new Date(month.y,month.m+1,0);
      if(t.endDate){const ed=new Date(t.endDate+"T12:00:00");if(eom>ed)return}
      if(t.excludedMonths&&t.excludedMonths.includes(mKey))return;
      if(txD<=eom){
        const isPd=(t.paidMonths||[]).includes(mKey);
        const overrides=t.monthOverrides[mKey]||{};
        const defaultDate=mKey+"-"+String(txD.getDate()).padStart(2,"0");
        items.push({...t,...overrides,accountId:acctId,date:overrides.date||defaultDate,_virtual:true,_recurPaid:isPd,_movedFrom:t.accountId});
      }
    });
    // Sort: for cards, paid on top then unpaid; for banks, by date
    if(isCard){
      return items.sort((a,b)=>{
        const aPaid=a._virtual&&a.isRecurring?a._recurPaid:a.paid;

        if(aPaid&&!bPaid)return -1;if(!aPaid&&bPaid)return 1;
        return a.date.localeCompare(b.date);
      });
    }
    return items.sort((a,b)=>a.date.localeCompare(b.date));
  },[txs,accounts,mKey,month]);

  const getBankBal=useCallback(id=>{
    const useToday=balMode==="today"&&isCurrentMonth;
    const cutoff=useToday?new Date(now.getFullYear(),now.getMonth(),now.getDate()+1):new Date(month.y,month.m+1,1);
    const cutoffS=cutoff.getFullYear()+"-"+String(cutoff.getMonth()+1).padStart(2,"0")+"-"+String(cutoff.getDate()).padStart(2,"0");
    return txs.filter(t=>t.accountId===id).reduce((s,t)=>{
      const baseV=(t.type==="income"||t.type==="transfer_in")?1:(t.type==="expense"||t.type==="transfer")?-1:0;
      if(baseV===0)return s;
      if(t.isRecurring){
        const st2=new Date(t.date+"T12:00:00");if(st2>=cutoff)return s;
        let el=cutoff;if(useToday){el=new Date(month.y,month.m+1,1)}
        if(t.endDate){const ed=new Date(t.endDate+"T12:00:00");if(ed<st2)return s;const en=new Date(ed.getFullYear(),ed.getMonth()+1,1);if(en<el)el=en}
        let total=0;
        const d=new Date(st2.getFullYear(),st2.getMonth(),1);
        while(d<el){
          const mk=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");
          if(!(t.excludedMonths&&t.excludedMonths.includes(mk))){
            // Check if this month was moved away
            const ov=t.monthOverrides&&t.monthOverrides[mk]?t.monthOverrides[mk]:null;
            if(!(ov&&ov._movedTo)){
              const monthAmount=ov&&ov.amount!==undefined?ov.amount:t.amount;
              total+=baseV*monthAmount;
            }
          }
          d.setMonth(d.getMonth()+1);
        }
        return s+total;
      }
      const v=baseV*t.amount;
      if(useToday){if(t.date<=todayKey)return s+v;return s}
      if(t.date<cutoffS)return s+v;return s;
    },0);
  },[txs,month,balMode,isCurrentMonth,todayKey]);
  const getBankPrev=useCallback(id=>{
    const c=mKey+"-01";const cms=new Date(month.y,month.m,1);
    return txs.filter(t=>t.accountId===id).reduce((s,t)=>{

      if(baseV===0)return s;
      if(t.isRecurring){
        const st2=new Date(t.date+"T12:00:00");if(st2>=cms)return s;
        let el=cms;if(t.endDate){const ed=new Date(t.endDate+"T12:00:00");if(ed<st2)return s;if(ed<cms)el=new Date(ed.getFullYear(),ed.getMonth()+1,1)}
        let total=0;

            if(!(ov&&ov._movedTo)){

              total+=baseV*monthAmount;
            }
          }

        }
        return s+total;
      }
      const v=baseV*t.amount;
      if(t.date<c)return s+v;return s;
    },0);
  },[txs,mKey,month]);

  const searchResults=useMemo(()=>{if(!searchQ||searchQ.length<2)return[];const q=searchQ.toLowerCase();return txs.filter(t=>t.description?.toLowerCase().includes(q)||t.category?.toLowerCase().includes(q)).slice(0,30)},[txs,searchQ]);

  /* Helper: get tx display color */
  const txColor=(t)=>{

    return(t.type==="income"||t.type==="transfer_in")?C.green:C.red;
  };

  /* ═══ NO PROFILE ═══ */
  if(!curProfileId||!activeProfile)return(
    <div style={ST.app}><div style={{padding:"48px 24px",textAlign:"center"}}><div style={{fontSize:48,marginBottom:16}}>👋</div><h1 style={{fontSize:24,fontWeight:700,marginBottom:8,color:C.text}}>Bem-vindo ao Finanças</h1><p style={{color:C.textSec,marginBottom:32,lineHeight:1.6}}>Crie um perfil para começar.</p>
      {profiles.length>0&&<div style={{marginBottom:28}}><p style={{color:C.textSec,fontSize:13,marginBottom:12}}>Perfis existentes:</p>{profiles.map(p=><button key={p.id} style={{display:"flex",alignItems:"center",gap:8,padding:"10px 24px",border:"1.5px solid "+p.color,borderRadius:12,background:"transparent",color:p.color,cursor:"pointer",fontSize:15,fontWeight:600,margin:"8px auto"}} onClick={()=>setCurProfileId(p.id)}><IcoUser/> {p.name}</button>)}</div>}

  );

      <div style={{padding:"0 16px"}}>{searchQ.length<2&&<p style={ST.empty}>Digite pelo menos 2 caracteres</p>}{searchQ.length>=2&&searchResults.length===0&&<p style={ST.empty}>Nenhum resultado</p>}
        {searchResults.map((t,i)=>{const acct=accounts.find(a=>a.id===t.accountId);const isIn=t.type==="income"||t.type==="transfer_in";const col=txColor(t);return <div key={t.id+i} style={{...ST.txItem,cursor:"pointer"}} onClick={()=>{setSelAcctId(t.accountId);setSearchOpen(false);setSearchQ("");setViewStack(["home","detail"])}}>
          <div style={{width:7,height:7,borderRadius:"50%",background:col,flexShrink:0}}/><div style={{flex:1,minWidth:0}}><div style={{fontSize:13,fontWeight:500,color:C.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.description}</div><div style={{fontSize:10,color:C.textSec,marginTop:2}}>{t.date.split("-").reverse().join("/")} · {t.category} {acct&&<span style={{color:acct.color}}>· {acct.name}</span>}</div></div>

          {!isCurrentMonth&&<button style={{...ST.navBtn,background:C.blue,color:"#fff",borderRadius:6,padding:"2px 6px",fontSize:10,fontWeight:700,marginLeft:2}} onClick={goToday}>Hoje</button>}

        <button style={{...ST.toggleBtn,...(balMode==="full"?ST.toggleActive:{})}} onClick={()=>setBalMode("full")}>Mês inteiro</button>
      </div>}

      {profMenuOpen&&<div style={{background:C.card,border:"1px solid "+C.cardBorder,borderRadius:12,margin:"0 16px 12px",padding:8,boxShadow:"0 4px 12px rgba(0,0,0,0.08)"}}>
        {profiles.map(p=><button key={p.id} style={{display:"flex",alignItems:"center",gap:8,width:"100%",padding:"10px 12px",background:"none",border:"none",cursor:"pointer",borderRadius:8,fontSize:14,fontWeight:500,color:p.id===curProfileId?C.text:p.color}} onClick={()=>{setCurProfileId(p.id);setProfMenuOpen(false)}}><IcoUser/> {p.name}{p.id===curProfileId?" ✓":""}</button>)}
        <div style={{borderTop:"1px solid "+C.cardBorder,margin:"6px 0"}}/><button style={{display:"flex",alignItems:"center",gap:8,width:"100%",padding:"10px 12px",background:"none",border:"none",cursor:"pointer",borderRadius:8,fontSize:14,color:C.blue}} onClick={()=>{setModal("newProfile");setProfMenuOpen(false)}}><IcoPlus/> Novo Perfil</button>

      {(bankAccts.length>0||cardAccts.length>0)&&(()=>{const tB=bankAccts.reduce((s,a)=>s+getBankBal(a.id),0);const tC=cardAccts.reduce((s,a)=>{const m=getMonthTxs(a.id);const sp=m.filter(t=>t.type==="expense"||t.type==="transfer").reduce((ss,t)=>ss+t.amount,0);const est=m.filter(t=>t.type==="income").reduce((ss,t)=>ss+t.amount,0);const pd=m.filter(t=>t.type==="transfer_in").reduce((ss,t)=>ss+t.amount,0);return s+Math.max(0,sp-est-pd)},0);const net=tB-tC;

          <div style={{display:"flex",gap:16,fontSize:12,fontFamily:"'JetBrains Mono',monospace"}}><span style={{color:C.green}}>Contas: {fmt(tB)}</span><span style={{color:C.amber}}>Cartões: -{fmt(tC)}</span></div>
        </div>})()}

        {bankAccts.length===0&&<p style={ST.empty}>Toque + para adicionar</p>}
        {bankAccts.map(a=>{const bal=getBankBal(a.id);const mT=getMonthTxs(a.id);const inc=mT.filter(t=>t.type==="income"||t.type==="transfer_in").reduce((s,t)=>s+t.amount,0);const exp=mT.filter(t=>t.type==="expense"||t.type==="transfer").reduce((s,t)=>s+t.amount,0);

            <div style={ST.aRow}><span style={{fontSize:15,fontWeight:600,color:C.text}}>{a.name}</span><span style={{fontSize:16,fontWeight:700,fontFamily:"'JetBrains Mono',monospace",color:bal>=0?C.green:C.red}}>{fmt(bal)}</span></div>
            <div style={{display:"flex",gap:16,marginTop:6,fontSize:12,fontFamily:"'JetBrains Mono',monospace"}}><span style={{color:C.green}}>+{fmt(inc)}</span><span style={{color:C.red}}>−{fmt(exp)}</span></div>
          </div>})}</div>

      <div style={ST.sec}><div style={ST.secH}><span style={{color:C.amber,display:"flex"}}><IcoCard/></span><h2 style={{fontSize:16,fontWeight:700,flex:1,color:C.text}}>Cartões de Crédito</h2><button style={ST.addSm} onClick={()=>setModal("newCard")}><IcoPlus/></button></div>
        {cardAccts.length===0&&<p style={ST.empty}>Toque + para adicionar</p>}
        {cardAccts.map(a=>{const mT=getMonthTxs(a.id);const sp=mT.filter(t=>t.type==="expense"||t.type==="transfer").reduce((s,t)=>s+t.amount,0);const est=mT.filter(t=>t.type==="income").reduce((s,t)=>s+t.amount,0);const pd=mT.filter(t=>t.type==="transfer_in").reduce((s,t)=>s+t.amount,0);const fat=Math.max(0,sp-est);
          return <div key={a.id} style={{...ST.aCard,borderLeftColor:a.color}} onClick={()=>{setSelAcctId(a.id);pushView("detail")}}>
            <div style={ST.aRow}><span style={{fontSize:15,fontWeight:600,color:C.text}}>{a.name}</span><span style={{fontSize:16,fontWeight:700,fontFamily:"'JetBrains Mono',monospace",color:C.amber}}>{fmt(fat)}</span></div>
            <div style={{display:"flex",gap:16,marginTop:6,fontSize:12,fontFamily:"'JetBrains Mono',monospace"}}><span style={{color:C.green}}>Pago: {fmt(pd)}</span><span style={{color:fat-pd>0?C.red:C.textSec}}>Resta: {fmt(Math.max(0,fat-pd))}</span></div>
          </div>})}</div>

      <Modal open={modal==="newProfile"} onClose={()=>setModal(null)} title="Novo Perfil"><ProfileForm onSubmit={addProfile}/></Modal>
      <Modal open={modal==="newBank"} onClose={()=>setModal(null)} title="Nova Conta"><AcctForm type="bank" usedColors={accounts.map(a=>a.color)} onSubmit={addAccount}/></Modal>
      <Modal open={modal==="newCard"} onClose={()=>setModal(null)} title="Novo Cartão"><AcctForm type="card" usedColors={accounts.map(a=>a.color)} onSubmit={addAccount}/></Modal>
    </div>
  );

  /* ═══ DETAIL ═══ */
  const isBank=curAcct?curAcct.type==="bank":true;const monthTxs=curAcct?getMonthTxs(selAcctId):[];const prevBal=isBank?getBankPrev(selAcctId):0;
  const mInc=monthTxs.filter(t=>t.type==="income"||t.type==="transfer_in").reduce((s,t)=>s+t.amount,0);
  const mExp=monthTxs.filter(t=>t.type==="expense"||t.type==="transfer").reduce((s,t)=>s+t.amount,0);
  const cSp=!isBank?monthTxs.filter(t=>t.type==="expense"||t.type==="transfer").reduce((s,t)=>s+t.amount,0):0;
  const cEstorno=!isBank?monthTxs.filter(t=>t.type==="income").reduce((s,t)=>s+t.amount,0):0;
  const cPd=!isBank?monthTxs.filter(t=>t.type==="transfer_in").reduce((s,t)=>s+t.amount,0):0;
  const cFatura=Math.max(0,cSp-cEstorno);
  const moveTargets=accounts.filter(a=>a.type===(curAcct?curAcct.type:"bank")&&a.id!==selAcctId);
  const allMoveTargets=moveTargets; // same list, now used in detail popup for all tx types including recurring

  return(
    <div style={ST.app} onTouchStart={handleTouchStart} onTouchEnd={handleTouchEnd}>
      <header style={{...ST.header,gap:8}}><div style={{display:"flex",alignItems:"center",gap:8,flex:1,minWidth:0}}><button style={ST.navBtn} onClick={popView}><IcoBack/></button><h1 style={{fontSize:17,fontWeight:700,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",color:C.text}}><span style={{color:curAcct?.color}}>{isBank?"🏦":"💳"}</span> {curAcct?.name}</h1></div>
        <button style={ST.navBtn} onClick={()=>setSearchOpen(true)}><IcoSearch/></button><button style={ST.navBtn} onClick={()=>setModal("editAcct")}><IcoEdit/></button><button style={{...ST.navBtn,color:C.red}} onClick={()=>deleteAccount(selAcctId)}><IcoTrash/></button></header>

      <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,padding:"0 16px 8px"}}>
        <button style={ST.navBtn} onClick={()=>navMonth(-1)}><IcoChevL/></button>
        <span style={{...ST.monthLbl,cursor:"pointer"}} onClick={goToday}>{MONTHS[month.m]} {month.y}</span>
        <button style={ST.navBtn} onClick={()=>navMonth(1)}><IcoChevR/></button>
        {!isCurrentMonth&&<button style={{...ST.navBtn,background:C.blue,color:"#fff",borderRadius:6,padding:"2px 6px",fontSize:10,fontWeight:700}} onClick={goToday}>Hoje</button>}
      </div>

      {/* Balance mode toggle */}
      {isCurrentMonth&&<div style={{display:"flex",justifyContent:"center",padding:"0 16px 8px",gap:4}}>
        <button style={{...ST.toggleBtn,...(balMode==="today"?ST.toggleActive:{})}} onClick={()=>setBalMode("today")}>Até hoje</button>
        <button style={{...ST.toggleBtn,...(balMode==="full"?ST.toggleActive:{})}} onClick={()=>setBalMode("full")}>Mês inteiro</button>
      </div>}

      <div style={{display:"flex",gap:6,padding:"0 16px 10px",flexWrap:"wrap"}}>
        {isBank?<><SumCard label="Entradas" value={fmt(mInc)} color={C.green}/><SumCard label="Saídas" value={fmt(mExp)} color={C.red}/><SumCard label={balMode==="today"&&isCurrentMonth?"Saldo Hoje":"Saldo Final"} value={fmt(getBankBal(selAcctId))} color={curAcct?.color||C.blue}/></>
        :<><SumCard label="Fatura" value={fmt(cFatura)} color={C.amber}/><SumCard label="Pago" value={fmt(cPd)} color={C.green}/><SumCard label="Restante" value={fmt(Math.max(0,cFatura-cPd))} color={cFatura-cPd>0?C.red:C.green}/></>}
      </div>

      {isBank&&prevBal!==0&&<div style={{fontSize:12,color:C.textSec,padding:"0 20px 10px",fontFamily:"'JetBrains Mono',monospace"}}>Saldo anterior: <strong>{fmt(prevBal)}</strong></div>}

      <div style={{display:"flex",flexDirection:"column",gap:2,padding:"0 16px"}}>
        {monthTxs.length===0&&<p style={ST.empty}>Nenhuma movimentação neste mês</p>}
        {(()=>{
          let lastDay=null;
          return monthTxs.map((t,i)=>{
          let running=null;if(isBank){running=prevBal+monthTxs.slice(0,i+1).reduce((s,x)=>{if(x.type==="income"||x.type==="transfer_in")return s+x.amount;if(x.type==="expense"||x.type==="transfer")return s-x.amount;return s},0)}
          const isIn=t.type==="income"||t.type==="transfer_in";const col=txColor(t);
          const destA=t.toAccountId?accounts.find(a=>a.id===t.toAccountId):null;const srcA=t.fromAccountId?accounts.find(a=>a.id===t.fromAccountId):null;
          const isPaid=t._virtual&&t.isRecurring?t._recurPaid:t.paid;
          const isRecurVirtual=t._virtual&&t.isRecurring;

          // Day separator for bank accounts
          const day=t.date.split("-")[2];
          let showDay=false;
          if(isBank&&day!==lastDay){showDay=true;lastDay=day}

          return <React.Fragment key={t.id+"-"+i}>
            {showDay&&<div style={{fontSize:11,fontWeight:700,color:C.textSec,padding:"10px 4px 4px",borderBottom:"1px solid "+C.cardBorder,marginBottom:4}}>{parseInt(day)} de {MONTHS[month.m]}</div>}
            <div style={{...ST.txItem,opacity:isPaid?0.55:1,cursor:"pointer"}} onClick={()=>{
              const ei=isRecurVirtual?{...t,paid:t._recurPaid}:t;
              setEditItem(ei);setModal("txDetail");
            }}>
            <button style={{width:22,height:22,borderRadius:6,border:"2px solid "+(isPaid?C.green:"#cbd5e1"),background:isPaid?"#dcfce7":"transparent",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",flexShrink:0,color:C.green,padding:0}} onClick={e=>{e.stopPropagation();if(isRecurVirtual)toggleRecurPaid(t.id,mKey);else togglePaid(t.id)}}>{isPaid&&<IcoCheck/>}</button>
            <div style={{display:"flex",alignItems:"center",gap:8,flex:1,minWidth:0}}>
              <div style={{width:7,height:7,borderRadius:"50%",background:col,flexShrink:0}}/>
              <div style={{minWidth:0,flex:1}}>
                <div style={{fontSize:13,fontWeight:500,color:C.text,display:"flex",alignItems:"center",gap:5,overflow:"hidden"}}>
                  <span style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.description}</span>
                  {t.instNum&&<span style={ST.badge}>{t.instNum}/{t.instTotal} <span style={{color:C.textTer,marginLeft:2}}>({fmt(t.instUnitAmount*t.instTotal)})</span></span>}
                  {t.isRecurring&&<span style={{...ST.badge,background:"#ede9fe",color:C.purple}}>Rec</span>}
                </div>
                <div style={{fontSize:10,color:C.textSec,marginTop:2}}>
                  {t.date.split("-").reverse().join("/")} · {t.category}
                </div>
              </div>
            </div>
            <div style={{textAlign:"right",flexShrink:0}}>
              <div style={{fontSize:13,fontWeight:600,fontFamily:"'JetBrains Mono',monospace",color:col}}>{isIn?"+":"−"} {fmt(t.amount)}</div>
              {running!==null&&<div style={{fontSize:9,color:C.textTer,fontFamily:"'JetBrains Mono',monospace",marginTop:1}}>Saldo: {fmt(running)}</div>}
            </div>
          </div>
          </React.Fragment>
        })})()}
      </div>

      <button style={ST.fab} onClick={()=>setModal("addTx")}><IcoPlus/> Nova Transação</button>

      <Modal open={modal==="addTx"||modal==="editTx"} onClose={()=>{setModal(null);setEditItem(null)}} title={modal==="editTx"?"Editar Transação":"Nova Transação"}>
        <TxForm initial={editItem} account={curAcct} allAccounts={accounts} profiles={profiles} descriptions={allDescriptions} descCatMap={descCatMap} onSubmit={(d)=>editItem?updateTx(editItem.id,d,editItem._editScope):addTx(d)}/>
      </Modal>

      {/* Transaction detail popup */}
      <Modal open={modal==="txDetail"} onClose={()=>{setModal(null);setEditItem(null)}} title="Detalhes da Transação">
        {editItem&&(()=>{
          const ei=editItem;const isIn=ei.type==="income"||ei.type==="transfer_in";const isTr=ei.type==="transfer"||ei.type==="transfer_in";
          const col=txColor(ei);const isRV=ei._virtual&&ei.isRecurring;
          const destA=ei.toAccountId?accounts.find(a=>a.id===ei.toAccountId):null;
          const srcA=ei.fromAccountId?accounts.find(a=>a.id===ei.fromAccountId):null;
          const isPaid=isRV?ei._recurPaid:ei.paid;
          return <div style={{display:"flex",flexDirection:"column",gap:14}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <div style={{width:10,height:10,borderRadius:"50%",background:col}}/>
              <span style={{fontSize:16,fontWeight:700,color:C.text,flex:1}}>{ei.description}</span>
              <span style={{fontSize:18,fontWeight:700,fontFamily:"'JetBrains Mono',monospace",color:col}}>{isIn?"+":"−"}{fmt(ei.amount)}</span>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:6,fontSize:13,color:C.textSec}}>
              <div><strong style={{color:C.text}}>Data:</strong> {ei.date.split("-").reverse().join("/")}</div>
              <div><strong style={{color:C.text}}>Tipo:</strong> {ei.type==="income"?"Entrada":ei.type==="expense"?"Saída":ei.type==="transfer"?"Transferência (saída)":"Transferência (entrada)"}</div>
              <div><strong style={{color:C.text}}>Categoria:</strong> {ei.category}</div>
              {ei.dueDate&&<div><strong style={{color:C.text}}>Vencimento:</strong> {ei.dueDate.split("-").reverse().join("/")}</div>}
              {destA&&<div><strong style={{color:C.text}}>Destino:</strong> <span style={{color:destA.color}}>{destA.name}</span></div>}
              {srcA&&<div><strong style={{color:C.text}}>Origem:</strong> <span style={{color:srcA.color}}>{srcA.name}</span></div>}
              {ei.instNum&&<div><strong style={{color:C.text}}>Parcela:</strong> {ei.instNum}/{ei.instTotal} (Total: {fmt(ei.instUnitAmount*ei.instTotal)})</div>}
              {ei.isRecurring&&<div><strong style={{color:C.text}}>Recorrente:</strong> Mensal</div>}
              <div><strong style={{color:C.text}}>Status:</strong> {isPaid?<span style={{color:C.green}}>Pago</span>:<span style={{color:C.amber}}>Pendente</span>}</div>
            </div>
            <div style={{display:"flex",gap:8,marginTop:4}}>
              {allMoveTargets.length>0&&<button style={{...ST.scopeBtn,flex:1,justifyContent:"center",borderColor:C.purple}} onClick={()=>{
                if(ei._virtual&&ei.isRecurring)setModal("moveRecurScope");
                else setModal("moveTx");
              }}><IcoMove/> Mover</button>}
              <button style={{...ST.scopeBtn,flex:1,justifyContent:"center",borderColor:C.blue}} onClick={()=>{
                if(isRV)setModal("editRecurScope");
                else if(ei.groupId)setModal("editInstScope");
                else setModal("editTx");
              }}><IcoEdit/> Editar</button>
              <button style={{...ST.scopeBtn,flex:1,justifyContent:"center",borderColor:C.red,color:C.red}} onClick={()=>{
                if(isRV)setModal("delRecurring");
                else if(ei.groupId)setModal("delInstall");
                else{deleteTx(ei.id);setModal(null);setEditItem(null)}
              }}><IcoTrash/> Excluir</button>
            </div>
          </div>
        })()}
      </Modal>
      <Modal open={modal==="editAcct"} onClose={()=>setModal(null)} title={"Editar "+(isBank?"Conta":"Cartão")}>
        <AcctForm type={curAcct?.type||"bank"} usedColors={accounts.filter(a=>a.id!==selAcctId).map(a=>a.color)} initial={curAcct} onSubmit={d=>{updateAccount(selAcctId,d);setModal(null)}}/>
      </Modal>
      {/* Move recurring scope */}
      <Modal open={modal==="moveRecurScope"} onClose={()=>{setModal(null);setEditItem(null)}} title="Mover Recorrência">
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          <p style={{color:C.textSec,fontSize:13}}><strong style={{color:C.text}}>{editItem?.description}</strong> — {editItem?fmt(editItem.amount):""} / mês</p>
          <button style={{...ST.scopeBtn,borderColor:C.amber}} onClick={()=>{setEditItem({...editItem,_moveScope:"this"});setModal("moveTx")}}><span style={{color:C.amber,fontWeight:700}}>1x</span> Mover apenas este mês ({MONTHS[month.m]})</button>
          <button style={{...ST.scopeBtn,borderColor:"#ea580c"}} onClick={()=>{setEditItem({...editItem,_moveScope:"forward"});setModal("moveTx")}}><span style={{color:"#ea580c",fontWeight:700}}>→</span> Mover daqui para frente</button>
          <button style={{...ST.scopeBtn,borderColor:C.blue}} onClick={()=>{setEditItem({...editItem,_moveScope:"all"});setModal("moveTx")}}><span style={{color:C.blue,fontWeight:700}}>✎</span> Mover desde a original (todos os meses)</button>
        </div>
      </Modal>

      <Modal open={modal==="moveTx"} onClose={()=>{setModal(null);setEditItem(null)}} title={"Mover para "+(isBank?"outra conta":"outro cartão")}>
        <div style={{display:"flex",flexDirection:"column",gap:10}}><p style={{color:C.textSec,fontSize:13}}>Transação: <strong style={{color:C.text}}>{editItem?.description}</strong> — {editItem?fmt(editItem.amount):""}</p>
          {moveTargets.map(a=>{const op=profiles.find(p=>p.id===a.profileId);return <button key={a.id} style={{display:"flex",alignItems:"center",gap:10,width:"100%",padding:"14px 16px",background:C.inputBg,border:"1.5px solid "+a.color,borderRadius:10,color:C.text,fontSize:14,fontWeight:500,cursor:"pointer"}} onClick={()=>moveTxToAccount(editItem.id,a.id,editItem?._moveScope)}><span style={{color:a.color}}>{a.type==="bank"?"🏦":"💳"}</span>{a.name}{op&&<span style={{fontSize:11,color:C.textSec,marginLeft:"auto"}}>({op.name})</span>}</button>})}</div>
      </Modal>

      {/* Edit recurring scope modal */}
      <Modal open={modal==="editRecurScope"} onClose={()=>{setModal(null);setEditItem(null)}} title="Editar Recorrência">
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          <p style={{color:C.textSec,fontSize:13}}><strong style={{color:C.text}}>{editItem?.description}</strong> — {editItem?fmt(editItem.amount):""} / mês</p>
          <button style={{...ST.scopeBtn,borderColor:C.amber}} onClick={()=>{setModal("editTxScoped");setEditItem({...editItem,_editScope:"this"})}}><span style={{color:C.amber,fontWeight:700}}>1x</span> Editar apenas este mês ({MONTHS[month.m]})</button>
          <button style={{...ST.scopeBtn,borderColor:"#ea580c"}} onClick={()=>{setModal("editTxScoped");setEditItem({...editItem,_editScope:"forward"})}}><span style={{color:"#ea580c",fontWeight:700}}>→</span> Editar daqui para frente</button>
          <button style={{...ST.scopeBtn,borderColor:C.blue}} onClick={()=>{setModal("editTxScoped");setEditItem({...editItem,_editScope:"all"})}}><span style={{color:C.blue,fontWeight:700}}>✎</span> Editar todas desde o início</button>
        </div>
      </Modal>

      {/* Edit installment scope modal */}
      <Modal open={modal==="editInstScope"} onClose={()=>{setModal(null);setEditItem(null)}} title="Editar Parcela">
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          <p style={{color:C.textSec,fontSize:13}}><strong style={{color:C.text}}>{editItem?.description}</strong> — Parcela {editItem?.instNum}/{editItem?.instTotal}</p>
          <button style={{...ST.scopeBtn,borderColor:C.amber}} onClick={()=>{setModal("editTx");setEditItem({...editItem,_editScope:"instThis"})}}><span style={{color:C.amber,fontWeight:700}}>1x</span> Editar apenas esta parcela ({editItem?.instNum}/{editItem?.instTotal})</button>
          <button style={{...ST.scopeBtn,borderColor:"#ea580c"}} onClick={()=>{setModal("editTx");setEditItem({...editItem,_editScope:"instForward"})}}><span style={{color:"#ea580c",fontWeight:700}}>→</span> Editar a partir desta parcela</button>
          <button style={{...ST.scopeBtn,borderColor:C.blue}} onClick={()=>{setModal("editTx");setEditItem({...editItem,_editScope:"instAll"})}}><span style={{color:C.blue,fontWeight:700}}>✎</span> Editar todas as parcelas</button>
        </div>
      </Modal>
      <Modal open={modal==="editTxScoped"} onClose={()=>{setModal(null);setEditItem(null)}} title="Editar Transação">
        <TxForm initial={editItem} account={curAcct} allAccounts={accounts} profiles={profiles} descriptions={allDescriptions} descCatMap={descCatMap} onSubmit={(d)=>updateTx(editItem.id,d,editItem?._editScope)}/>
      </Modal>

      {/* Delete modals */}
      <Modal open={modal==="delInstall"} onClose={()=>{setModal(null);setEditItem(null)}} title="Excluir Parcela">
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          <p style={{color:C.textSec,fontSize:13}}><strong style={{color:C.text}}>{editItem?.description}</strong> — Parcela {editItem?.instNum}/{editItem?.instTotal}</p>
          <button style={{...ST.scopeBtn,borderColor:C.amber}} onClick={()=>{deleteTx(editItem.id);setModal(null);setEditItem(null)}}><span style={{color:C.amber}}>1x</span> Excluir apenas esta parcela</button>
          <button style={{...ST.scopeBtn,borderColor:C.red}} onClick={()=>{deleteTx(editItem.id,{group:true});setModal(null);setEditItem(null)}}><span style={{color:C.red}}>Todas</span> Excluir todas as {editItem?.instTotal} parcelas</button>
        </div>
      </Modal>
      <Modal open={modal==="delRecurring"} onClose={()=>{setModal(null);setEditItem(null)}} title="Excluir Recorrência">
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          <p style={{color:C.textSec,fontSize:13}}><strong style={{color:C.text}}>{editItem?.description}</strong> — {editItem?fmt(editItem.amount):""} / mês</p>
          <button style={{...ST.scopeBtn,borderColor:C.amber}} onClick={()=>{deleteTx(editItem.id,{recurMode:"this"});setModal(null);setEditItem(null)}}><span style={{color:C.amber}}>1x</span> Excluir apenas este mês ({MONTHS[month.m]})</button>
          <button style={{...ST.scopeBtn,borderColor:"#ea580c"}} onClick={()=>{deleteTx(editItem.id,{recurMode:"forward"});setModal(null);setEditItem(null)}}><span style={{color:"#ea580c"}}>→</span> Excluir daqui para frente</button>
          <button style={{...ST.scopeBtn,borderColor:C.red}} onClick={()=>{deleteTx(editItem.id,{recurMode:"all"});setModal(null);setEditItem(null)}}><span style={{color:C.red}}>✕</span> Excluir desde a primeira</button>
        </div>
      </Modal>
    </div>
  );
}

/* Forms */
function ProfileForm({onSubmit}){const[name,setName]=useState("");const[color,setColor]=useState(PROF_COLORS[0]);return <div style={{display:"flex",flexDirection:"column",gap:14}}><Field label="Nome"><input style={ST.input} placeholder="Ex: Pessoal" value={name} onChange={e=>setName(e.target.value)}/></Field><Field label="Cor"><div style={{display:"flex",gap:8}}>{PROF_COLORS.map(c=><button key={c} onClick={()=>setColor(c)} style={{width:36,height:36,borderRadius:"50%",background:c,border:color===c?"3px solid "+C.text:"3px solid transparent",cursor:"pointer"}}/>)}</div></Field><button style={ST.submitBtn} disabled={!name.trim()} onClick={()=>onSubmit({name:name.trim(),color})}>Criar Perfil</button></div>}

function AcctForm({type,usedColors,onSubmit,initial}){const[name,setName]=useState(initial?.name||"");const avail=ACCT_COLORS.filter(c=>!usedColors.includes(c));const[color,setColor]=useState(initial?.color||avail[0]||ACCT_COLORS[0]);return <div style={{display:"flex",flexDirection:"column",gap:14}}><Field label="Nome"><input style={ST.input} placeholder={type==="bank"?"Ex: Nubank":"Ex: Visa Platinum"} value={name} onChange={e=>setName(e.target.value)}/></Field><Field label="Cor"><div style={{display:"flex",gap:8,flexWrap:"wrap"}}>{ACCT_COLORS.map(c=><button key={c} onClick={()=>setColor(c)} style={{width:32,height:32,borderRadius:"50%",background:c,border:color===c?"3px solid "+C.text:"3px solid transparent",cursor:"pointer"}}/>)}</div></Field><button style={ST.submitBtn} disabled={!name.trim()} onClick={()=>onSubmit({name:name.trim(),color,type})}>{initial?"Salvar":"Criar"} {type==="bank"?"Conta":"Cartão"}</button></div>}

function TxForm({initial,account,allAccounts,profiles,descriptions,descCatMap,onSubmit}){
  const isBank=account?.type==="bank";
  const[form,setForm]=useState(()=>{if(initial)return{...initial,amount:String(initial.amount)};return{accountId:account?.id||"",date:td(),description:"",category:"Outros > Outros",amount:"",type:isBank?"expense":"expense",toAccountId:"",dueDate:"",installments:1,isRecurring:false,paid:false}});
  const[tried,setTried]=useState(false);
  const set=(k,v)=>setForm(p=>({...p,[k]:v}));
  const others=allAccounts.filter(a=>a.id!==account?.id);
  const gp=acct=>{const pr=(profiles||[]).find(p=>p.id===acct.profileId);return pr?pr.name:""};
  const errs={};if(tried){if(!form.description)errs.description="Obrigatório";if(!form.amount)errs.amount="Obrigatório";if(form.type==="transfer"&&!form.toAccountId)errs.toAccountId="Selecione";if(!isBank&&!form.dueDate)errs.dueDate="Obrigatório"}
  const handleSubmit=()=>{setTried(true);if(!form.description||!form.amount||(form.type==="transfer"&&!form.toAccountId)||(!isBank&&!form.dueDate))return;onSubmit({...form,amount:parseFloat(form.amount)||0,installments:parseInt(form.installments)||1,category:form.type==="transfer"?"Finanças > Transferência":form.category})};

  return <div style={{display:"flex",flexDirection:"column",gap:12}}>
    {isBank&&<div style={{display:"flex",gap:6}}>
      <button style={{...ST.typeBtn,...(form.type==="income"?{borderColor:C.green,color:C.green,background:"#f0fdf4"}:{})}} onClick={()=>set("type","income")}><IcoUp/> Entrada</button>
      <button style={{...ST.typeBtn,...(form.type==="expense"?{borderColor:C.red,color:C.red,background:"#fef2f2"}:{})}} onClick={()=>set("type","expense")}><IcoDown/> Saída</button>
      <button style={{...ST.typeBtn,...(form.type==="transfer"?{borderColor:C.purple,color:C.purple,background:"#f5f3ff"}:{})}} onClick={()=>set("type","transfer")}><IcoTransfer/> Transf.</button>
    </div>}
    {!isBank&&<div style={{display:"flex",gap:6,marginBottom:4}}>
      <button style={{...ST.typeBtn,...(form.type==="expense"?{borderColor:C.red,color:C.red,background:"#fef2f2"}:{})}} onClick={()=>set("type","expense")}><IcoDown/> Despesa</button>
      <button style={{...ST.typeBtn,...(form.type==="income"?{borderColor:C.green,color:C.green,background:"#f0fdf4"}:{})}} onClick={()=>set("type","income")}><IcoUp/> Estorno</button>
    </div>}
    {form.type==="transfer"&&<Field label="Destino" error={errs.toAccountId}><select style={ST.input} className={errs.toAccountId?"field-error":""} value={form.toAccountId} onChange={e=>set("toAccountId",e.target.value)}><option value="">Selecione...</option>{others.map(a=><option key={a.id} value={a.id}>{a.type==="card"?"💳":"🏦"} {a.name} ({gp(a)})</option>)}</select></Field>}
    <Field label="Data"><input type="date" style={ST.input} value={form.date} onChange={e=>set("date",e.target.value)}/></Field>
    <Field label="Descrição" error={errs.description}><DescInput style={ST.input} className={errs.description?"field-error":""} value={form.description} onChange={v=>set("description",v)} onSelect={v=>{set("description",v);if(descCatMap&&descCatMap[v])set("category",descCatMap[v])}} suggestions={descriptions}/></Field>
    <Field label={initial?.instNum?("Valor parcela "+initial.instNum+"/"+initial.instTotal+" (R$)"):"Valor "+(form.installments>1?"da parcela ":"")+"(R$)"} error={errs.amount}><MoneyInput style={ST.input} className={errs.amount?"field-error":""} value={form.amount} onChange={v=>set("amount",v)}/></Field>
    <Field label="Categoria"><CatSelect value={form.category} onChange={v=>set("category",v)} style={ST.input}/></Field>
    {!isBank&&<Field label="Data de Vencimento" error={errs.dueDate}><input type="date" style={ST.input} className={errs.dueDate?"field-error":""} value={form.dueDate} onChange={e=>set("dueDate",e.target.value)}/></Field>}
    {/* Installments & recurring for ALL types including income (#2, #6) */}
    {!initial&&<div style={{display:"flex",gap:12,alignItems:"flex-end"}}>
      <Field label="Parcelas"><InstStepper value={form.installments} onChange={v=>set("installments",v)} disabled={form.isRecurring}/></Field>
      {form.installments>1&&<div style={{padding:"8px 0",fontSize:13,color:C.textSec,fontFamily:"'JetBrains Mono',monospace"}}>Total: {fmt((parseFloat(form.amount)||0)*form.installments)}</div>}
      <Field label="Recorrente"><label style={{display:"flex",alignItems:"center",gap:8,color:C.text,fontSize:14,padding:"8px 0",cursor:"pointer"}}><input type="checkbox" checked={form.isRecurring} onChange={e=>{set("isRecurring",e.target.checked);if(e.target.checked)set("installments",1)}} style={{width:18,height:18,accentColor:C.green}}/> Mensal</label></Field>
    </div>}
    {initial&&initial.isRecurring&&<Field label="Recorrente"><label style={{display:"flex",alignItems:"center",gap:8,color:C.text,fontSize:14,padding:"8px 0",cursor:"pointer"}}><input type="checkbox" checked={form.isRecurring} onChange={e=>set("isRecurring",e.target.checked)} style={{width:18,height:18,accentColor:C.green}}/> Mensal</label></Field>}
    <Field label="Status"><label style={{display:"flex",alignItems:"center",gap:8,color:C.text,fontSize:14,padding:"8px 0",cursor:"pointer"}}><input type="checkbox" checked={form.paid||false} onChange={e=>set("paid",e.target.checked)} style={{width:18,height:18,accentColor:C.green}}/> Pago</label></Field>
    <button style={ST.submitBtn} onClick={handleSubmit}>{initial?"Salvar":"Adicionar"}</button>
  </div>
}

/* Styles - Light Theme */
const ST={
  app:{fontFamily:"'DM Sans',sans-serif",background:C.bg,color:C.text,minHeight:"100vh",maxWidth:520,margin:"0 auto",paddingBottom:80},
  header:{padding:"16px 16px 10px",display:"flex",justifyContent:"space-between",alignItems:"center"},
  navBtn:{background:"none",border:"none",color:C.textSec,cursor:"pointer",padding:4,display:"flex",borderRadius:6},
  monthLbl:{fontSize:14,fontWeight:600,color:C.text,minWidth:100,textAlign:"center"},
  sec:{padding:"4px 16px 14px"},
  secH:{display:"flex",alignItems:"center",gap:10,marginBottom:10},
  addSm:{background:C.card,border:"1px solid "+C.cardBorder,color:C.blue,width:32,height:32,borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer"},
  aCard:{background:C.card,borderRadius:10,padding:"14px 16px",marginBottom:8,cursor:"pointer",borderLeft:"3px solid",boxShadow:"0 1px 3px rgba(0,0,0,0.06)"},
  aRow:{display:"flex",justifyContent:"space-between",alignItems:"center"},
  txItem:{display:"flex",alignItems:"center",padding:"10px 8px",borderRadius:8,background:C.card,marginBottom:3,gap:6,transition:"opacity .2s",boxShadow:"0 1px 2px rgba(0,0,0,0.04)"},
  badge:{fontSize:9,background:"#f1f5f9",color:C.textSec,padding:"2px 5px",borderRadius:4,fontWeight:600,display:"inline-flex",alignItems:"center",gap:2,whiteSpace:"nowrap",flexShrink:0},
  sBtn:{background:"none",border:"none",color:C.textTer,cursor:"pointer",padding:3,borderRadius:4,display:"flex"},
  empty:{textAlign:"center",color:C.textTer,padding:28,fontSize:14},
  fab:{position:"fixed",bottom:20,left:"50%",transform:"translateX(-50%)",background:"linear-gradient(135deg,#6366f1,#4f46e5)",color:"#fff",border:"none",borderRadius:28,padding:"14px 24px",fontSize:14,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",gap:8,boxShadow:"0 4px 16px rgba(99,102,241,0.35)",zIndex:10},
  overlay:{position:"fixed",inset:0,background:C.overlayBg,display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:100,backdropFilter:"blur(4px)"},
  modal:{background:C.card,borderRadius:"20px 20px 0 0",width:"100%",maxWidth:520,maxHeight:"85vh",overflow:"auto",padding:"0 20px 24px"},
  modalH:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"18px 0 10px",position:"sticky",top:0,background:C.card,zIndex:1},
  iBtn:{background:"none",border:"none",color:C.textSec,cursor:"pointer",padding:4,display:"flex",borderRadius:6},
  lbl:{fontSize:11,fontWeight:600,color:C.textSec,textTransform:"uppercase",letterSpacing:"0.5px"},
  input:{background:C.inputBg,border:"1px solid "+C.inputBorder,borderRadius:10,padding:"11px 13px",color:C.text,fontSize:15,width:"100%"},
  typeBtn:{flex:1,display:"flex",alignItems:"center",justifyContent:"center",gap:5,padding:"10px 0",border:"1px solid "+C.inputBorder,background:C.inputBg,color:C.textSec,borderRadius:10,fontSize:13,fontWeight:600,cursor:"pointer",transition:"all .2s"},
  submitBtn:{background:"linear-gradient(135deg,#6366f1,#4f46e5)",color:"#fff",border:"none",borderRadius:12,padding:"13px",fontSize:15,fontWeight:700,cursor:"pointer",marginTop:4},
  stepBtn:{display:"flex",alignItems:"center",justifyContent:"center",width:36,height:44,background:"none",border:"none",color:C.blue,cursor:"pointer"},
  scopeBtn:{display:"flex",alignItems:"center",gap:10,width:"100%",padding:"14px 16px",background:C.inputBg,border:"1.5px solid",borderRadius:10,color:C.text,fontSize:14,fontWeight:500,cursor:"pointer"},
  toggleBtn:{padding:"6px 14px",borderRadius:8,border:"1px solid "+C.cardBorder,background:C.card,color:C.textSec,fontSize:12,fontWeight:600,cursor:"pointer",transition:"all .2s"},
  toggleActive:{background:C.blue,color:"#fff",borderColor:C.blue},
};

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
